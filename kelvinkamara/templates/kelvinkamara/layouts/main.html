{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Self-referencing canonical URL for SEO, so search engines know the preferred URL for this page -->
    <!-- This should be added for each page to indicate the preferred URL -->
    <link rel="canonical" href="https://kelvinkamara.com" />
    <meta charset="utf-8"/>
    <title>Kelvin Kamara - Award Winning Software Engineer</title>
    <meta name="HandheldFriendly" content="True"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="keywords" content="Award Winning, Build, Websites, Web Apps, Mobile Apps, Desktop Apps"/>
    <meta name="author" content="Kelvin Kamara"/>
    <meta name="title" content="Kelvin Kamara - Award Winning Software Engineer"/>
    <meta name="description" content="Mr. Kelvin Kamara has over ten years of commercial experience delivering both front-end and back-end solutions. He believes in using the right tool for the job and takes a practical, quality-driven approach to building effective software. With a particular strength in back-end and server-side development, Kel received the UK Government Cabinet Office Recognition Award in April 2019 for his work on secure web systems."/>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}"/>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}"/>
    <!-- Removed the following line because previous line imports all font-awesome. -->
    <!-- <link href="{% static 'css/font-awesome.min.css' %}"/> -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/modal-styles.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/award-how.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/recommendations.css' %}"/>
    <script
        src="{% static 'js/theme-init.js' %}"
        data-storage-key="kelvinkamara.theme"
        data-dark-theme-href="{% static 'css/dark-theme.css' %}"
    ></script>
</head>  
<body id="home">
    <div class="site-wrapper">
        {% include "kelvinkamara/layouts/partials/header.html" %}
        {% block content %} {% endblock %}
    </div>

    <footer class="site-footer">
        <p>
            <span>
              Kelvin Kamara © 2026
            </span>
            <a 
                href="https://github.com/kkamara"
                class="footer-icon-container"
            >
                <i class="fab fa-github-square fa-3x footer-icon"></i>
            </a>
            <a 
                href="https://www.linkedin.com/in/kelvin-kamara"
                class="footer-icon-container"
            >
                <i class="fab fa-linkedin fa-3x footer-icon"></i>
            </a>
            <a 
                href="https://www.facebook.com/realkelvinkamara"
                class="footer-icon-container"
            >
                <i class="fab fa-facebook-square fa-3x footer-icon"></i>
            </a>
            <a
                id="theme-toggle"
                href="#"
                class="footer-icon-container"
                role="button"
                aria-label="Toggle dark mode"
                aria-pressed="false"
                data-dark-theme-href="{% static 'css/dark-theme.css' %}"
            >
                <i id="theme-toggle-icon" class="fas fa-toggle-off fa-3x"></i>
            </a>
        </p>
    </footer>
    {% include "kelvinkamara/layouts/partials/scripts.html" %}
</body>
